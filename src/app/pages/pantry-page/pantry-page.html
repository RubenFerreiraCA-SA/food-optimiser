<main class="pantry-page">
  <app-page-hero [config]="hero" />
  <section class="ingredients" aria-labelledby="ingredients-title">
    <div class="section-heading">
      <div>
        <p class="eyebrow"><span></span>{{ pantry.ingredients().length }} ingredients available</p>
        <h2 id="ingredients-title">Available ingredients</h2>
      </div>
      <div class="actions">
        <button class="button secondary" type="button" (click)="showResetWarning.set(true)">
          Reset pantry</button
        ><button class="button primary" type="button" (click)="isAdding.set(!isAdding())">
          {{ isAdding() ? 'Close' : 'Add ingredient' }} <span aria-hidden="true">+</span>
        </button>
      </div>
    </div>
    @if (isAdding()) {
      <form class="add-form" (ngSubmit)="addIngredient()">
        <label
          >Ingredient name<input
            name="ingredient-name"
            [(ngModel)]="name"
            placeholder="e.g. Beans"
            required /></label
        ><label
          >Quantity<input
            name="ingredient-quantity"
            [(ngModel)]="quantity"
            type="number"
            min="1"
            required /></label
        ><button class="button primary" type="submit">Add ingredient</button>
        @if (addError) {
          <p class="form-error">{{ addError }}</p>
        }
      </form>
    }
    <app-ingredient-table [config]="ingredientTable" (action)="handleTableAction($event)" (quantityChange)="updateEditingQuantity($event.quantity)" />
  </section>
</main>
@if (showResetWarning()) {
  <app-dialog [config]="resetDialog" (action)="handleResetDialog($event)" />
}
@if (ingredientToRemove(); as ingredient) {
  <app-dialog [config]="removeDialog(ingredient)" (action)="handleRemovalDialog($event)" />
}
@if (blockedIngredient(); as ingredient) {
  <app-dialog [config]="blockedDialog(ingredient)" (action)="cancelDialogs()" />
}
