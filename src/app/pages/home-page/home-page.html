<main class="home">
  <section class="hero" aria-labelledby="page-title">
    <div class="hero-copy">
      <p class="eyebrow"><span></span>Make every ingredient count</p>
      <h1 id="page-title">Get more meals<br />from what you have.</h1>
      <p class="intro">
        Find the best combination of meals to make the greatest number of servings from your
        available ingredients.
      </p>
    </div>

    <app-hero-illustration />
  </section>

  <section class="actions" aria-labelledby="actions-title">
    <div class="section-heading">
      <h2 id="actions-title">What would you like to do?</h2>
    </div>

    <div class="action-grid">
      @for (card of actionCards; track card.href) {
        <app-action-card [config]="card" />
      }
    </div>
  </section>
</main>
